# This is a Databricks Asset Bundle (DAB) — a.k.a. Declarative Automation Bundle —
# scaffolding the network_analytics_pipeline Lakeflow Spark Declarative Pipeline (SDP).
# SDP: https://docs.databricks.com/aws/en/ldp
# Bundles: https://docs.databricks.com/aws/en/dev-tools/bundles/

bundle:
  name: network_analytics_pipeline
  uuid: 7a3f6b2e-9c1a-4d5e-b8f3-2a4c6e8f1d23

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog to write tables into.
    default: cmegdemos_catalog
  schema:
    description: Schema to publish bronze/silver/gold tables to.
    default: network_analytics_enablement
  raw_volume_path:
    description: Volume path holding the raw zip / csv files consumed by the pipeline.
    default: /Volumes/cmegdemos_catalog/network_analytics_enablement/raw_data
  cell_towers_incoming_subdir:
    description: >
      Subdirectory under raw_volume_path where OpenCellID gzip CSV shards are
      dropped (append-only). Auto Loader ingests all *.csv.gz files recursively.
    default: cell_towers
  ops_app_kpis_incoming_subdir:
    description: >
      Subdirectory under raw_volume_path where ops-app tower KPI gzip CSV shards
      are dropped for Auto Loader ingestion.
    default: kpis
  ops_app_demand_incoming_subdir:
    description: >
      Subdirectory under raw_volume_path where ops-app building demand gzip CSV
      shards are dropped for Auto Loader ingestion.
    default: demand
  notifications_email:
    description: Optional email for pipeline failure notifications.
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-cmegdemos.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://fevm-cmegdemos.cloud.databricks.com
      root_path: /Workspace/Shared/.bundle/prod/${bundle.name}
    permissions:
      - level: CAN_MANAGE
        user_name: ${workspace.current_user.userName}
